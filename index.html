<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Duolingo Clone</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .app {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }
    h2 { color: #58cc02; }
    .streak { font-size: 16px; color: #ff9600; margin-bottom: 10px; }
    .language-selector { margin-bottom: 15px; }
    .language-selector select {
      padding: 5px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }
    .question { font-size: 18px; margin: 20px 0; }
    .options button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      cursor: pointer;
      background: #fff;
      transition: 0.2s;
    }
    .options button:hover { background: #f0f0f0; }
    .correct { background: #58cc02 !important; color: white; }
    .wrong { background: #ff4b4b !important; color: white; }
    .next {
      margin-top: 15px;
      padding: 10px;
      background: #58cc02;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="app">
  <h2>Mini Duolingo</h2>
  <div class="streak" id="streak">Streak: 0</div>
  <div class="language-selector">
    <select id="language" onchange="changeLanguage()">
      <option value="spanish">Spanish</option>
      <option value="french">French</option>
      <option value="german">German</option>
      <option value="italian">Italian</option>
      <option value="portuguese">Portuguese</option>
    </select>
  </div>
  <div class="question" id="question"></div>
  <div class="options" id="options"></div>
  <button class="next" onclick="nextQuestion()">Next</button>
</div>

<script>
const questions = {
  spanish: [
    {
      q: "Translate: Apple",
      options: ["Manzana", "Perro", "Casa"],
      answer: "Manzana"
    },
    {
      q: "Translate: Dog",
      options: ["Gato", "Perro", "Libro"],
      answer: "Perro"
    },
    {
      q: "Translate: House",
      options: ["Casa", "Agua", "Fuego"],
      answer: "Casa"
    },
    {
      q: "Translate: Water",
      options: ["Agua", "Fuego", "Sol"],
      answer: "Agua"
    },
    {
      q: "Translate: Book",
      options: ["Libro", "Mesa", "Puerta"],
      answer: "Libro"
    }
  ],
  french: [
    {
      q: "Translate: Apple",
      options: ["Pomme", "Chien", "Maison"],
      answer: "Pomme"
    },
    {
      q: "Translate: Dog",
      options: ["Chat", "Chien", "Livre"],
      answer: "Chien"
    },
    {
      q: "Translate: House",
      options: ["Maison", "Eau", "Feu"],
      answer: "Maison"
    },
    {
      q: "Translate: Water",
      options: ["Eau", "Feu", "Soleil"],
      answer: "Eau"
    },
    {
      q: "Translate: Book",
      options: ["Livre", "Table", "Porte"],
      answer: "Livre"
    }
  ],
  german: [
    {
      q: "Translate: Apple",
      options: ["Apfel", "Hund", "Haus"],
      answer: "Apfel"
    },
    {
      q: "Translate: Dog",
      options: ["Katze", "Hund", "Buch"],
      answer: "Hund"
    },
    {
      q: "Translate: House",
      options: ["Haus", "Wasser", "Feuer"],
      answer: "Haus"
    },
    {
      q: "Translate: Water",
      options: ["Wasser", "Feuer", "Sonne"],
      answer: "Wasser"
    },
    {
      q: "Translate: Book",
      options: ["Buch", "Tisch", "Tür"],
      answer: "Buch"
    }
  ],
  italian: [
    {
      q: "Translate: Apple",
      options: ["Mela", "Cane", "Casa"],
      answer: "Mela"
    },
    {
      q: "Translate: Dog",
      options: ["Gatto", "Cane", "Libro"],
      answer: "Cane"
    },
    {
      q: "Translate: House",
      options: ["Casa", "Acqua", "Fuoco"],
      answer: "Casa"
    },
    {
      q: "Translate: Water",
      options: ["Acqua", "Fuoco", "Sole"],
      answer: "Acqua"
    },
    {
      q: "Translate: Book",
      options: ["Libro", "Tavolo", "Porta"],
      answer: "Libro"
    }
  ],
  portuguese: [
    {
      q: "Translate: Apple",
      options: ["Maçã", "Cão", "Casa"],
      answer: "Maçã"
    },
    {
      q: "Translate: Dog",
      options: ["Gato", "Cão", "Livro"],
      answer: "Cão"
    },
    {
      q: "Translate: House",
      options: ["Casa", "Água", "Fogo"],
      answer: "Casa"
    },
    {
      q: "Translate: Water",
      options: ["Água", "Fogo", "Sol"],
      answer: "Água"
    },
    {
      q: "Translate: Book",
      options: ["Livro", "Mesa", "Porta"],
      answer: "Livro"
    }
  ]
};

let currentLanguage = 'spanish';
let index = 0;
let streak = parseInt(localStorage.getItem('streak')) || 0;

document.getElementById('streak').innerText = `Streak: ${streak}`;

function changeLanguage() {
  currentLanguage = document.getElementById('language').value;
  index = 0;
  loadQuestion();
}

function loadQuestion() {
  const q = questions[currentLanguage][index];
  document.getElementById("question").innerText = q.q;
  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(btn, q.answer);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(button, correct) {
  const buttons = document.querySelectorAll(".options button");
  buttons.forEach(btn => btn.disabled = true);

  if (button.innerText === correct) {
    button.classList.add("correct");
    streak++;
  } else {
    button.classList.add("wrong");
    buttons.forEach(btn => {
      if (btn.innerText === correct) btn.classList.add("correct");
    });
    streak = 0;
  }
  localStorage.setItem('streak', streak);
  document.getElementById('streak').innerText = `Streak: ${streak}`;
}

function nextQuestion() {
  index++;
  if (index >= questions[currentLanguage].length) {
    document.querySelector(".app").innerHTML = "<h2>Finished 🎉</h2><p>Your final streak: " + streak + "</p>";
    return;
  }
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
